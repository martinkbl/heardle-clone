<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist Loading Test</title>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="config.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-section {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            border-left: 4px solid #4285f4;
        }
        button {
            background: #4285f4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #3367d6;
        }
        .log {
            background: #f8f9fa;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .success { color: #1b5e20; }
        .error { color: #c62828; }
        .info { color: #1565c0; }
    </style>
</head>
<body>
    <h1>🔧 YouTube Playlist Loading Debug Test</h1>
    
    <div class="test-section">
        <h3>Step 1: Authentication</h3>
        <button onclick="testAuthentication()">🔐 Test Authentication</button>
        <div id="authResult" class="log"></div>
    </div>
    
    <div class="test-section">
        <h3>Step 2: YouTube API Initialization</h3>
        <button onclick="testYouTubeAPI()" disabled id="apiBtn">🎵 Test YouTube API</button>
        <div id="apiResult" class="log"></div>
    </div>
    
    <div class="test-section">
        <h3>Step 3: Playlist Loading</h3>
        <button onclick="testPlaylistLoading()" disabled id="playlistBtn">📋 Test Playlist Loading</button>
        <div id="playlistResult" class="log"></div>
    </div>

    <script>
        const CLIENT_ID = YOUTUBE_CONFIG.CLIENT_ID;
        const API_KEY = YOUTUBE_CONFIG.API_KEY;
        const SCOPES = YOUTUBE_CONFIG.SCOPES;
        const DISCOVERY_DOCS = YOUTUBE_CONFIG.DISCOVERY_DOCS;
        
        let accessToken = null;
        
        function log(message, type = 'info', elementId) {
            const timestamp = new Date().toLocaleTimeString();
            const logElement = document.getElementById(elementId || 'authResult');
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            logElement.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
            logElement.scrollTop = logElement.scrollHeight;
            console.log(`[${timestamp}] ${message}`);
        }
        
        function testAuthentication() {
            log('Starting authentication test...', 'info', 'authResult');
            document.getElementById('authResult').innerHTML = '';
            
            // Initialize Google Identity Services
            if (typeof google !== 'undefined' && google.accounts) {
                log('✅ Google Identity Services available', 'success', 'authResult');
                
                google.accounts.id.initialize({
                    client_id: CLIENT_ID,
                    callback: handleCredentialResponse
                });
                
                // Use token client for OAuth
                const tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    callback: (response) => {
                        if (response.access_token) {
                            accessToken = response.access_token;
                            log('✅ Successfully got access token!', 'success', 'authResult');
                            log(`Token: ${response.access_token.substring(0, 20)}...`, 'info', 'authResult');
                            
                                                         // Set the token for gapi
                             gapi.client.setToken(response);
                             document.getElementById('apiBtn').disabled = false;
                             log('✅ YouTube API button enabled!', 'success', 'authResult');
                        } else {
                            log('❌ Failed to get access token', 'error', 'authResult');
                        }
                    },
                });
                
                log('🔄 Requesting access token...', 'info', 'authResult');
                tokenClient.requestAccessToken();
                
            } else {
                log('❌ Google Identity Services not available', 'error', 'authResult');
            }
        }
        
        function handleCredentialResponse(response) {
            log('✅ Received credential response', 'success', 'authResult');
        }
        
        function testYouTubeAPI() {
            log('Testing YouTube API initialization...', 'info', 'apiResult');
            document.getElementById('apiResult').innerHTML = '';
            
            if (!accessToken) {
                log('❌ No access token available', 'error', 'apiResult');
                return;
            }
            
            log('✅ Access token available', 'success', 'apiResult');
            log('🔄 Initializing gapi client...', 'info', 'apiResult');
            
            gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: DISCOVERY_DOCS
            }).then(() => {
                log('✅ gapi.client initialized successfully', 'success', 'apiResult');
                
                if (gapi.client.youtube) {
                    log('✅ YouTube API client available', 'success', 'apiResult');
                    document.getElementById('playlistBtn').disabled = false;
                } else {
                    log('❌ YouTube API client not available', 'error', 'apiResult');
                }
                
            }).catch(error => {
                log(`❌ Error initializing gapi.client: ${error}`, 'error', 'apiResult');
            });
        }
        
        function testPlaylistLoading() {
            log('Testing playlist loading...', 'info', 'playlistResult');
            document.getElementById('playlistResult').innerHTML = '';
            
            if (!gapi.client.youtube) {
                log('❌ YouTube API client not available', 'error', 'playlistResult');
                return;
            }
            
            log('✅ YouTube API client available', 'success', 'playlistResult');
            log('🔄 Making playlist API request...', 'info', 'playlistResult');
            
            const request = gapi.client.youtube.playlists.list({
                part: 'snippet,contentDetails',
                mine: true,
                maxResults: 50
            });
            
            request.execute(function(response) {
                log('✅ API request completed', 'success', 'playlistResult');
                
                if (response.error) {
                    log(`❌ API Error: ${response.error.message}`, 'error', 'playlistResult');
                    log(`Error details: ${JSON.stringify(response.error, null, 2)}`, 'error', 'playlistResult');
                } else {
                    const playlists = response.items || [];
                    log(`✅ Successfully loaded ${playlists.length} playlists`, 'success', 'playlistResult');
                    
                    if (playlists.length > 0) {
                        log('📋 Your playlists:', 'info', 'playlistResult');
                        playlists.forEach((playlist, index) => {
                            const title = playlist.snippet.title;
                            const count = playlist.contentDetails.itemCount || 0;
                            log(`  ${index + 1}. "${title}" (${count} songs)`, 'info', 'playlistResult');
                        });
                    } else {
                        log('📋 No playlists found in your account', 'info', 'playlistResult');
                    }
                }
            });
        }
        
        // Initialize when page loads
        window.onload = function() {
            log('Page loaded. Click "Test Authentication" to start.', 'info', 'authResult');
        };
    </script>
</body>
</html>
