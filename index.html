<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Heardle Unlimited</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            width: 100%;
            background: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .game-container {
            width: 100%;
            min-height: 100vh;
            background: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header with title and icons */
        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid #333;
        }

        .header-left,
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-button {
            width: 40px;
            height: 40px;
            background: none;
            border: 2px solid #666;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: border-color 0.2s;
        }

        .icon-button:hover {
            border-color: #999;
        }

        .game-title {
            font-size: 28px;
            font-weight: 600;
            color: #fff;
            text-align: center;
        }

        /* Game content area */
        .game-content {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
        }

        /* Instruction text */
        .instruction-text {
            color: #888;
            font-size: 16px;
            margin-bottom: 30px;
            text-align: center;
        }

        /* Audio player section */
        .audio-player {
            width: 100%;
            margin-bottom: 40px;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-bottom: 20px;
            position: relative;
        }

        .progress-container.clickable {
            cursor: pointer;
        }

        .progress-bar {
            height: 100%;
            background: #1db954;
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        .play-button {
            width: 80px;
            height: 80px;
            background: none;
            border: 3px solid #fff;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 40px;
            transition: all 0.2s;
        }

        .play-button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .play-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Search input */
        .search-container {
            width: 100%;
            margin-bottom: 30px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            background: #222;
            border: 2px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: #666;
        }

        .search-input::placeholder {
            color: #666;
        }

        .clear-button {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 18px;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 20px;
            width: 100%;
            margin-bottom: 40px;
        }

        .action-button {
            flex: 1;
            padding: 15px 25px;
            background: #333;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .skip-button {
            background: #444;
        }

        .submit-button {
            background: #1db954;
        }

        .action-button:hover:not(:disabled) {
            opacity: 0.8;
        }

        .action-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Answer boxes */
        .answer-boxes {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .answer-box {
            width: 100%;
            height: 50px;
            background: transparent;
            border: 2px solid #444;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: #888;
            font-size: 16px;
            position: relative;
        }

        .answer-box.current {
            border-color: #666;
            background: rgba(255, 255, 255, 0.05);
        }

        .answer-box.correct {
            border-color: #1db954;
            background: rgba(29, 185, 84, 0.2);
            color: #1db954;
        }

        .answer-box.incorrect {
            border-color: #e22134;
            background: rgba(226, 33, 52, 0.2);
            color: #e22134;
        }

        .answer-box.skipped {
            border-color: #ff9500;
            background: rgba(255, 149, 0, 0.2);
            color: #ff9500;
        }

        .attempt-number {
            position: absolute;
            left: -40px;
            color: #666;
            font-size: 14px;
            font-weight: bold;
        }

        /* Game over screen */
        .game-over {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .game-over.victory h2 {
            color: #1db954;
        }

        .game-over.defeat h2 {
            color: #e22134;
        }

        .song-info {
            background: #222;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .song-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .song-artist {
            font-size: 16px;
            color: #888;
            margin-bottom: 8px;
        }

        .attempts-used {
            font-size: 14px;
            color: #666;
        }

        .play-again-button {
            background: #1db954;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .play-again-button:hover {
            background: #1ed760;
        }

        /* Game stats */
        .game-stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 20px;
            font-size: 14px;
            color: #888;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .game-header {
                padding: 15px 20px;
            }

            .game-title {
                font-size: 24px;
            }

            .icon-button {
                width: 35px;
                height: 35px;
                font-size: 16px;
            }

            .play-button {
                width: 70px;
                height: 70px;
                font-size: 20px;
            }

            .attempt-number {
                left: -30px;
                font-size: 12px;
            }
        }

        /* Audio visualization */
        .audio-loading {
            color: #888;
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }

        /* Playlist dropdown selector */
        .playlist-select {
            background: #222;
            color: #fff;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .playlist-select:hover, .playlist-select:focus {
            border-color: #1db954;
            background: #2a2a2a;
        }
    </style>
</head>

<body>
    <div class="game-container">
        <!-- Header with title and icons -->
        <div class="game-header">
            <div class="header-left">
            </div>

            <h1 class="game-title">Heardle Unlimited</h1>

            <div class="header-right">
                <select id="playlistSelect" class="playlist-select" title="Choose Playlist">
                    <!-- Dynamically populated -->
                </select>
            </div>
        </div>

        <!-- Game content -->
        <div class="game-content">
            <!-- Game stats -->
            <div class="game-stats">
                <span>Attempt: <span id="currentAttempt">1</span>/6</span>
                <span>Clip Length: <span id="clipLength">1</span>s</span>
                <span id="songSource">Source: Default Songs</span>
            </div>

            <!-- Answer boxes -->
            <div class="answer-boxes">
                <div class="answer-box current" data-attempt="1">
                    <div class="attempt-number">1</div>
                </div>
                <div class="answer-box" data-attempt="2">
                    <div class="attempt-number">2</div>
                </div>
                <div class="answer-box" data-attempt="3">
                    <div class="attempt-number">3</div>
                </div>
                <div class="answer-box" data-attempt="4">
                    <div class="attempt-number">4</div>
                </div>
                <div class="answer-box" data-attempt="5">
                    <div class="attempt-number">5</div>
                </div>
                <div class="answer-box" data-attempt="6">
                    <div class="attempt-number">6</div>
                </div>
            </div>

            <!-- Instruction text -->
            <p class="instruction-text" id="instructionText">Turn up the volume and tap to start the track!</p>

            <!-- Audio loading indicator -->
            <div class="audio-loading hidden" id="audioLoading">Loading audio...</div>

            <!-- Audio player -->
            <div class="audio-player">
                <div id="gameAudio"></div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:01</span>
                </div>
                <button class="play-button" id="playButton">▶</button>
            </div>

            <!-- Search input -->
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Know it? Search for the title" id="searchInput">
                <button class="clear-button" id="clearButton">✕</button>
            </div>

            <!-- Action buttons -->
            <div class="action-buttons">
                <button class="action-button skip-button" id="skipButton">SKIP (+1s)</button>
                <button class="action-button submit-button" id="submitButton">SUBMIT</button>
            </div>

            <!-- Game over screen -->
            <div class="game-over" id="gameOver">
                <h2 id="gameOverTitle">Congratulations!</h2>
                <div class="song-info">
                    <div class="song-title" id="correctTitle">Song Title</div>
                    <div class="song-artist" id="correctArtist">Artist Name</div>
                    <div class="attempts-used" id="attemptsUsed">Solved in 1 attempt!</div>
                </div>
                <button class="play-again-button" id="playAgainButton">Play Again</button>
            </div>
        </div>
    </div>

    <!-- Load local fallback playlists if file:// protocol blocks fetch -->
    <script src="playlists.js"></script>
    <script>
        // YouTube API Configuration
        // Note: We use the IFrame API which doesn't require an API Key for playback

        // Game configuration
        const SNIPPET_DURATIONS = [1, 2, 4, 7, 11, 16]; // seconds
        const MAX_ATTEMPTS = 6;

        // Game state
        let songs = [];
        let currentSong = null;
        let currentAttempt = 1;
        let gameEnded = false;
        let isPlaying = false;
        let playbackTimer = null;
        let player = null; // YouTube Player instance
        let playerReady = false;
        let playlistsData = {};
        let activePlaylistKey = '';

        // DOM elements
        const playButton = document.getElementById('playButton');
        const progressBar = document.getElementById('progressBar');
        const currentTimeDisplay = document.getElementById('currentTime');
        const totalTimeDisplay = document.getElementById('totalTime');
        const searchInput = document.getElementById('searchInput');
        const clearButton = document.getElementById('clearButton');
        const skipButton = document.getElementById('skipButton');
        const submitButton = document.getElementById('submitButton');
        const gameOver = document.getElementById('gameOver');
        const currentAttemptDisplay = document.getElementById('currentAttempt');
        const clipLengthDisplay = document.getElementById('clipLength');
        const instructionText = document.getElementById('instructionText');
        const audioLoading = document.getElementById('audioLoading');
        const progressContainer = document.querySelector('.progress-container');

        // Initialize Game
        window.onload = async function () {
            setupEventListeners();
            await loadSongs();
        };

        async function loadSongs() {
            try {
                // Attempt to load playlists using fetch (works when served via HTTP/S)
                const response = await fetch('playlists.json');
                if (!response.ok) throw new Error('Failed to load playlists.json');
                playlistsData = await response.json();
                console.log(`Loaded playlists via fetch`);
            } catch (error) {
                console.warn('Could not fetch playlists.json directly (likely CORS/file:// policy). Trying local script fallback...');
                // Fall back to the script-loaded HEARDLE_PLAYLISTS variable
                if (window.HEARDLE_PLAYLISTS && typeof window.HEARDLE_PLAYLISTS === 'object' && Object.keys(window.HEARDLE_PLAYLISTS).length > 0) {
                    playlistsData = window.HEARDLE_PLAYLISTS;
                    console.log(`Loaded playlists via local playlists.js script fallback`);
                } else {
                    console.error('Error loading playlists and local fallback not available:', error);
                    instructionText.textContent = "Error: Could not load playlists.json";
                    return;
                }
            }

            // Populate the dropdown selector
            const playlistSelect = document.getElementById('playlistSelect');
            playlistSelect.innerHTML = '';
            
            const playlistKeys = Object.keys(playlistsData);
            if (playlistKeys.length === 0) {
                alert('playlists.json is empty. Run the generator script!');
                return;
            }

            playlistKeys.forEach(key => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = playlistsData[key].name;
                playlistSelect.appendChild(option);
            });

            // Set default playlist
            activePlaylistKey = playlistKeys[0];
            songs = playlistsData[activePlaylistKey].songs;
            document.getElementById('songSource').textContent = `Playlist: ${playlistsData[activePlaylistKey].name}`;

            initDailyGame();
        }

        function initDailyGame() {
            // Randomly select a song for "Unlimited" mode
            const songIndex = Math.floor(Math.random() * songs.length);
            currentSong = songs[songIndex];

            console.log('Selected Song:', currentSong.title); // Debug

            // Initialize Player
            loadYouTubeIframeAPI();
        }

        function loadYouTubeIframeAPI() {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        }

        // Called by YouTube API
        window.onYouTubeIframeAPIReady = function () {
            player = new YT.Player('gameAudio', { // we use the gameAudio element
                height: '1',
                width: '1',
                videoId: currentSong.id,
                playerVars: {
                    'playsinline': 1,
                    'controls': 0,
                    'disablekb': 1,
                    'fs': 0
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        };

        function onPlayerReady(event) {
            playerReady = true;
            instructionText.textContent = "Ready! Turn up the volume and tap to start.";
            // Pre-buffer
            player.setVolume(100);
        }

        function onPlayerStateChange(event) {
            // Reset state if video ends naturally (0 is ended)
            if (event.data === 0 || (window.YT && event.data === window.YT.PlayerState.ENDED)) {
                isPlaying = false;
                playButton.textContent = "▶";
                progressBar.style.width = '0%';
                currentTimeDisplay.textContent = '0:00';
                if (gameEnded && player.getDuration) {
                    totalTimeDisplay.textContent = formatTime(player.getDuration());
                }
            }
        }

        function formatTime(time) {
            if (isNaN(time) || time === undefined) return "0:00";
            const mins = Math.floor(time / 60);
            const secs = Math.floor(time % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateProgressBarForFullPlayback() {
            if (!isPlaying || !gameEnded) return;

            const currentTime = player.getCurrentTime();
            const duration = player.getDuration() || 1;
            const progress = (currentTime / duration) * 100;

            progressBar.style.width = `${progress}%`;
            currentTimeDisplay.textContent = formatTime(currentTime);
            totalTimeDisplay.textContent = formatTime(duration);

            if (isPlaying) {
                requestAnimationFrame(updateProgressBarForFullPlayback);
            }
        }

        // Audio Control (Toggles play/pause; handles full playback at game over)
        function playAudio() {
            if (!playerReady) return;

            // Full playback mode when game is over
            if (gameEnded) {
                if (isPlaying) {
                    player.pauseVideo();
                    isPlaying = false;
                    playButton.textContent = "▶";
                } else {
                    isPlaying = true;
                    playButton.textContent = "⏸";
                    player.playVideo();
                    if (player.getDuration) {
                        totalTimeDisplay.textContent = formatTime(player.getDuration());
                    }
                    updateProgressBarForFullPlayback();
                }
                return;
            }

            // Normal gameplay mode (snippet playback)
            if (isPlaying) {
                // Pause snippet playback
                if (playbackTimer) {
                    clearTimeout(playbackTimer);
                    playbackTimer = null;
                }
                player.pauseVideo();
                isPlaying = false;
                playButton.textContent = "▶";
                progressBar.style.width = '0%';
                currentTimeDisplay.textContent = '0:00';
            } else {
                // Start snippet playback
                const duration = SNIPPET_DURATIONS[currentAttempt - 1];
                isPlaying = true;
                playButton.textContent = "⏸";

                player.seekTo(0);
                player.playVideo();

                animateProgressBar(duration);

                playbackTimer = setTimeout(() => {
                    player.pauseVideo();
                    player.seekTo(0);
                    isPlaying = false;
                    playButton.textContent = "▶";
                    progressBar.style.width = '0%';
                    currentTimeDisplay.textContent = '0:00';
                }, duration * 1000);
            }
        }

        function animateProgressBar(duration) {
            let start = performance.now();
            progressBar.style.width = '0%';

            function step(timestamp) {
                if (!isPlaying || gameEnded) {
                    // Stop animating if paused or if game ended mid-play
                    progressBar.style.width = '0%';
                    return;
                }

                const elapsed = (timestamp - start) / 1000;
                const progress = Math.min(elapsed / duration, 1);
                progressBar.style.width = `${progress * 100}%`;
                currentTimeDisplay.textContent = `0:${Math.floor(elapsed).toString().padStart(2, '0')}`;

                if (progress < 1) {
                    requestAnimationFrame(step);
                } else {
                    currentTimeDisplay.textContent = '0:00';
                }
            }
            requestAnimationFrame(step);
        }

        // ==========================================
        // Game Logic
        // ==========================================

        function submitGuess() {
            if (gameEnded) return;

            const guess = searchInput.value.trim().toLowerCase();
            if (!guess) return;

            // Basic check - in a real game we'd fuzzy match against a list
            const correctTitle = currentSong.title.toLowerCase();
            const correctArtist = currentSong.artist.toLowerCase();

            // Simple string matching
            const isCorrect = guess.includes(correctTitle) || (guess.includes(correctTitle) && guess.includes(correctArtist));

            if (isCorrect) {
                endGame(true);
            } else {
                markAttempt(false);
                if (currentAttempt < MAX_ATTEMPTS) {
                    currentAttempt++;
                    updateGameState();
                } else {
                    endGame(false);
                }
            }
            searchInput.value = '';
        }

        function skipAttempt() {
            if (gameEnded) return;

            markAttempt(true); // skipped

            if (currentAttempt < MAX_ATTEMPTS) {
                currentAttempt++;
                updateGameState();
            } else {
                endGame(false);
            }
        }

        function markAttempt(skipped) {
            const boxes = document.querySelectorAll('.answer-box');
            const box = boxes[currentAttempt - 1];

            if (skipped) {
                box.classList.add('skipped');
                box.textContent = "SKIPPED";
            } else {
                box.classList.add('incorrect');
                box.textContent = searchInput.value || "INCORRECT";
            }
        }

        function updateGameState() {
            // Update UI for next attempt
            currentAttemptDisplay.textContent = currentAttempt;
            clipLengthDisplay.textContent = SNIPPET_DURATIONS[currentAttempt - 1];
            totalTimeDisplay.textContent = `0:${SNIPPET_DURATIONS[currentAttempt - 1].toString().padStart(2, '0')}`;

            // Highlight next box
            const boxes = document.querySelectorAll('.answer-box');
            boxes.forEach(b => b.classList.remove('current'));

            if (currentAttempt <= MAX_ATTEMPTS) {
                boxes[currentAttempt - 1].classList.add('current');
            }
            instructionText.textContent = "Incorrect. +Seconds added.";
        }

        function endGame(won) {
            // Reset player playback if it's currently playing a snippet
            if (playbackTimer) {
                clearTimeout(playbackTimer);
                playbackTimer = null;
            }
            if (playerReady && player.pauseVideo) {
                player.pauseVideo();
                player.seekTo(0);
            }
            isPlaying = false;
            playButton.textContent = "▶";
            progressBar.style.width = '0%';
            currentTimeDisplay.textContent = '0:00';
            
            // Set the total duration to show the full song length if available
            if (playerReady && player.getDuration) {
                totalTimeDisplay.textContent = formatTime(player.getDuration());
            }

            // Make the progress bar clickable/interactive
            if (progressContainer) {
                progressContainer.classList.add('clickable');
            }

            gameEnded = true;
            gameOver.style.display = 'block';

            if (won) {
                gameOver.classList.add('victory');
                document.getElementById('gameOverTitle').textContent = "You got it!";

                // Show correct answer in the current box
                const boxes = document.querySelectorAll('.answer-box');
                const box = boxes[currentAttempt - 1];
                box.classList.remove('current');
                box.classList.add('correct');
                box.textContent = `${currentSong.artist} - ${currentSong.title}`;
            } else {
                gameOver.classList.add('defeat');
                document.getElementById('gameOverTitle').textContent = "Game Over";
            }

            document.getElementById('correctTitle').textContent = currentSong.title;
            document.getElementById('correctArtist').textContent = currentSong.artist;
            document.getElementById('attemptsUsed').textContent = won ? `Solved in ${currentAttempt}` : "Better luck next time";

            // Play Again button
            const playAgainBtn = document.getElementById('playAgainButton');
            playAgainBtn.onclick = () => resetGame(false);
        }

        function resetGame(newPlaylistSelected = false) {
            // Stop playback
            if (playbackTimer) {
                clearTimeout(playbackTimer);
                playbackTimer = null;
            }
            if (playerReady && player && player.pauseVideo) {
                player.pauseVideo();
                player.seekTo(0);
            }
            isPlaying = false;
            playButton.textContent = "▶";
            progressBar.style.width = '0%';
            currentTimeDisplay.textContent = '0:00';

            // Reset game states
            currentAttempt = 1;
            gameEnded = false;
            
            // Reset UI elements
            currentAttemptDisplay.textContent = '1';
            clipLengthDisplay.textContent = SNIPPET_DURATIONS[0];
            totalTimeDisplay.textContent = `0:${SNIPPET_DURATIONS[0].toString().padStart(2, '0')}`;
            instructionText.textContent = "Turn up the volume and tap to start the track!";
            
            // Reset answer boxes
            const boxes = document.querySelectorAll('.answer-box');
            boxes.forEach((box, index) => {
                box.className = 'answer-box' + (index === 0 ? ' current' : '');
                box.textContent = '';
                // Add attempt number back
                const attemptNum = document.createElement('div');
                attemptNum.className = 'attempt-number';
                attemptNum.textContent = index + 1;
                box.appendChild(attemptNum);
            });

            // Make the progress bar unclickable/standard
            if (progressContainer) {
                progressContainer.classList.remove('clickable');
            }

            // Hide game over screen
            gameOver.className = 'game-over';
            gameOver.style.display = 'none';

            // Select new song
            const songIndex = Math.floor(Math.random() * songs.length);
            currentSong = songs[songIndex];
            console.log('Selected Song:', currentSong.title); // Debug

            // If player is already loaded, cue/load the new video
            if (playerReady && player && player.cueVideoById) {
                player.cueVideoById(currentSong.id);
            }
        }

        // Search Autocomplete (Simple version)
        searchInput.addEventListener('input', function () {
            // In a real app, filtering currentSong.title against 1000s of songs needs a list
            // For now, we assume strict match or simple contains
        });

        function setupEventListeners() {
            playButton.addEventListener('click', playAudio);
            submitButton.addEventListener('click', submitGuess);
            skipButton.addEventListener('click', skipAttempt);
            clearButton.addEventListener('click', () => searchInput.value = '');

            // Playlist selector listener
            const playlistSelect = document.getElementById('playlistSelect');
            playlistSelect.addEventListener('change', function () {
                activePlaylistKey = this.value;
                songs = playlistsData[activePlaylistKey].songs;
                document.getElementById('songSource').textContent = `Playlist: ${playlistsData[activePlaylistKey].name}`;
                resetGame(true);
            });

            // Click on progress bar to seek (only when gameEnded is true)
            if (progressContainer) {
                progressContainer.addEventListener('click', function (e) {
                    if (!gameEnded || !playerReady || !player.getDuration) return;

                    const rect = progressContainer.getBoundingClientRect();
                    const clickX = e.clientX - rect.left;
                    const width = rect.width;
                    const percentage = Math.max(0, Math.min(clickX / width, 1));

                    const duration = player.getDuration();
                    const targetTime = percentage * duration;

                    player.seekTo(targetTime, true);

                    // If not playing, update the bar and current time text immediately
                    if (!isPlaying) {
                        progressBar.style.width = `${percentage * 100}%`;
                        currentTimeDisplay.textContent = formatTime(targetTime);
                    }
                });
            }

            // Enter key
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') submitGuess();
            });
        }
    </script>
</body>
